---
# Playbook 3: Kubernetes Cluster Bootstrap
# Run on control plane first, then workers join.
# Uses kubeadm to initialise the cluster and Flannel as the CNI.

- name: Initialise Kubernetes control plane
  hosts: control_plane
  become: true

  vars:
    pod_cidr: "10.244.0.0/16"          # Flannel default
    floating_ip: "195.201.45.21"        # For external kubectl access

  tasks:

    - name: Check if cluster is already initialised
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeconfig

    - name: Initialise cluster with kubeadm
      command: >
        kubeadm init
        --apiserver-advertise-address={{ hostvars[inventory_hostname]['private_ip'] }}
        --apiserver-cert-extra-sans={{ floating_ip }},{{ hostvars[inventory_hostname]['ansible_host'] }}
        --pod-network-cidr={{ pod_cidr }}
        --node-name={{ inventory_hostname }}
      when: not kubeconfig.stat.exists
      register: kubeadm_init

    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: "0755"

    - name: Copy kubeconfig for root
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        mode: "0600"

    - name: Download Flannel manifest
      get_url:
        url: https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
        dest: /tmp/kube-flannel.yml
        force: yes
      when: not kubeconfig.stat.exists

    - name: Configure Flannel to use private network interface
      replace:
        path: /tmp/kube-flannel.yml
        regexp: '- --kube-subnet-mgr$'
        replace: "- --kube-subnet-mgr\n        - --iface=enp7s0"
      when: not kubeconfig.stat.exists

    - name: Install Flannel CNI
      command: kubectl apply -f /tmp/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: not kubeconfig.stat.exists

    - name: Get worker join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command to local file
      local_action:
        module: copy
        content: "{{ join_command.stdout }}"
        dest: /tmp/k8s-join-command.sh
        mode: "0600"
      become: false

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: /tmp/kubeconfig
        flat: yes
      become: false

    - name: Update kubeconfig server to use public IP
      replace:
        path: /tmp/kubeconfig
        regexp: "https://{{ hostvars[inventory_hostname]['private_ip'] }}:6443"
        replace: "https://{{ hostvars[inventory_hostname]['ansible_host'] }}:6443"
      delegate_to: localhost
      become: false


- name: Join worker nodes to the cluster
  hosts: workers
  become: true

  tasks:

    - name: Check if node already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Read join command from local file
      set_fact:
        join_command: "{{ lookup('file', '/tmp/k8s-join-command.sh') }}"
      when: not kubelet_conf.stat.exists

    - name: Join cluster
      command: "{{ join_command }}"
      when: not kubelet_conf.stat.exists


- name: Verify cluster health
  hosts: control_plane
  become: true

  tasks:

    - name: Wait for all nodes to be Ready
      command: kubectl get nodes --no-headers
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: nodes_status
      until: nodes_status.stdout_lines | length == 3 and 'NotReady' not in nodes_status.stdout
      retries: 20
      delay: 15

    - name: Show cluster nodes
      debug:
        msg: "{{ nodes_status.stdout_lines }}"
