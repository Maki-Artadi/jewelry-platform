---
# Playbook 1: OS Hardening
# Run on all nodes before anything else.
# Hardens SSH, sets up firewall, disables swap (required for k8s).

- name: Harden all nodes
  hosts: all
  become: true

  tasks:

    # ── Hostname ──────────────────────────────────────────────────────────────
    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Add hostname to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[inventory_hostname]['private_ip'] }} {{ inventory_hostname }}"
        state: present

    # ── System updates ────────────────────────────────────────────────────────
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install essential packages
      apt:
        name:
          - ufw
          - unattended-upgrades
          - curl
          - wget
          - vim
          - htop
          - net-tools
        state: present

    # ── SSH hardening ─────────────────────────────────────────────────────────
    - name: Disable root password login (keep key-based auth)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin prohibit-password"
        state: present
      notify: Restart SSH

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Restart SSH

    # ── UFW firewall ──────────────────────────────────────────────────────────
    - name: Allow SSH
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow Kubernetes API server
      ufw:
        rule: allow
        port: "6443"
        proto: tcp

    - name: Allow HTTP
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Allow all traffic on private network interface
      ufw:
        rule: allow
        src: "10.0.1.0/24"

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
        direction: incoming

    # ── Swap (must be disabled for Kubernetes) ────────────────────────────────
    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Disable swap permanently (remove from fstab)
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    # ── Unattended upgrades ───────────────────────────────────────────────────
    - name: Enable unattended security upgrades
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
