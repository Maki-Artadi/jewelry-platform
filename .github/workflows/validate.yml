name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-ansible:
    name: Lint Ansible playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install required Ansible collections
        run: |
          mkdir -p $HOME/.ansible/collections
          ansible-galaxy collection install \
            -r ansible/requirements.yml \
            -p $HOME/.ansible/collections

      - name: Lint playbooks
        env:
          ANSIBLE_COLLECTIONS_PATH: $HOME/.ansible/collections
        run: ansible-lint ansible/playbooks/

  validate-k8s:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xf /tmp/kubeconform.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/kubeconform

      - name: Validate manifests
        run: |
          for f in k8s/*.yaml; do
            echo "Validating $f..."
            kubeconform -strict -ignore-missing-schemas "$f"
          done

  validate-helm:
    name: Validate Helm values
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add required Helm repos
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Lint ingress-nginx values
        run: |
          helm pull ingress-nginx/ingress-nginx --untar --untardir /tmp/charts
          helm lint /tmp/charts/ingress-nginx -f helm/ingress-nginx-values.yaml

      - name: Lint kube-prometheus-stack values
        run: |
          helm pull prometheus-community/kube-prometheus-stack --untar --untardir /tmp/charts
          helm lint /tmp/charts/kube-prometheus-stack -f helm/kube-prometheus-stack-values.yaml
